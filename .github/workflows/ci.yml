name: My first pipeline

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push image to registry
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ciportfolios .

      - name: Build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ciportfolios .

      - name: List images
        run: docker images

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: echo hello
        run: echo "Hello World"